<body>
<div id="app">
  <!-- 页面一：卡片式目录页 -->
  <div class="page-view" id="homeView">
    <div class="home-layout">
      <!-- 左侧 1/4：课程选择侧边栏 -->
      <aside class="book-sidebar">
        <h2>课程选择</h2>
        <label class="book-select-label">
          <select class="book-select" id="bookSelect">
            <option value="">选择课本</option>
          </select>
        </label>
      </aside>

      <!-- 右侧 3/4：卡片网格区 -->
      <main class="card-grid-area">
        <div id="unitListContainer"></div>
      </main>
    </div>
  </div>

  <!-- 页面二：全屏沉浸式播放页 -->
  <div class="page-view hidden" id="playerView">
    <header class="player-header">
      <button id="playerBackBtn" class="player-back-btn" type="button" aria-label="返回目录">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M13 4L7 10L13 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>目录</span>
      </button>
      <h2 id="playerTitle" class="player-title"></h2>
    </header>
    <section class="player-lyrics-area">
      <div id="playerLyrics" class="lyrics-display"></div>
    </section>
    <!-- 底部播放器控制栏 -->
    <section class="player-controls" aria-label="课程与播放控制区">
      <div class="nav-buttons">
        <button id="prevUnitBtn" class="nav-btn prev-btn" title="上一课">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
            <path d="M12 16L7 11L12 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <button id="playPauseBtn" class="play-btn" aria-label="播放或暂停" disabled>
          <svg class="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z" />
          </svg>
          <svg class="pause-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z" />
          </svg>
        </button>
        <button id="nextUnitBtn" class="nav-btn next-btn" title="下一课">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
            <path d="M8 4L13 9L8 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <button id="speedBtn" class="speed-btn" title="播放速度">
          <span id="speedText">1.0x</span>
        </button>
        <button id="toggleTranslationBtn" class="toggle-translation-btn" type="button" aria-pressed="false">
          中
        </button>
        <button id="playModeBtn" class="play-mode-btn" type="button" title="单句点读" aria-label="单句点读" aria-pressed="false">
          <svg class="mode-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <g class="single-icon">
              <path d="M10.4 5.1L14 9l-3.6 3.9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M4.4 9h8.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              <circle cx="4.5" cy="4.7" r="2.1" stroke="currentColor" stroke-width="1.4" />
              <path d="M4.2 3.8h.7v1.9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
            </g>
            <g class="continuous-icon">
              <path d="M5 5.2h6.1c1.2 0 2.2 1 2.2 2.2v.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M11.7 3.8L13.9 6l-2.2 2.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M13 12.8H6.9c-1.2 0-2.2-1-2.2-2.2V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M6.3 15.2L4.1 13l2.2-2.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            </g>
          </svg>
        </button>
      </div>
      <div class="audio-progress">
        <audio id="audioPlayer"></audio>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-handle" id="progressHandle"></div>
        </div>
      </div>
    </section>
  </div>
</div>

<script src="js/main.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js');
