<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="English learning platform with audio playback and bilingual text support." />
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <title>English Learning Hub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1 class="app-title">English Learning Hub</h1>
      <nav class="book-nav">
        <select id="bookSelector" aria-label="Select textbook">
          <option value="">Loading...</option>
        </select>
      </nav>
    </header>

    <main id="catalogView" class="catalog-view">
      <section class="unit-grid" id="unitGrid">
      </section>
    </main>

    <dialog id="playerDialog" class="player-dialog">
      <div class="dialog-backdrop"></div>
      <div class="dialog-content">
        <header class="dialog-header">
          <button id="closePlayerBtn" class="close-btn" aria-label="Close player">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
          <h2 id="playerTitle" class="dialog-title"></h2>
          <div class="unit-nav">
            <button id="prevUnitBtn" class="nav-arrow" aria-label="Previous unit">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 18l-6-6 6-6" />
              </svg>
            </button>
            <button id="nextUnitBtn" class="nav-arrow" aria-label="Next unit">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18l6-6-6-6" />
              </svg>
            </button>
          </div>
        </header>

        <section class="lyrics-panel" id="lyricsPanel">
          <div id="lyricsContainer" class="lyrics-container">
          </div>
        </section>

        <footer class="control-bar">
          <div class="primary-controls">
            <button id="playPauseBtn" class="ctrl-btn play-btn" aria-label="Play">
              <svg class="icon-play" viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                <path d="M8 5v14l11-7z" />
              </svg>
              <svg class="icon-pause" viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                <path d="M6 4h4v16H6zm8 0h4v16h-4z" />
              </svg>
            </button>
          </div>

          <div class="progress-section">
            <span id="currentTime" class="time-label">0:00</span>
            <div id="progressTrack" class="progress-track">
              <div id="progressFill" class="progress-fill"></div>
              <div id="progressThumb" class="progress-thumb"></div>
            </div>
            <span id="duration" class="time-label">0:00</span>
          </div>

          <div class="secondary-controls">
            <button id="speedBtn" class="ctrl-btn" aria-label="Playback speed">
              <span id="speedLabel">1.0x</span>
            </button>
            <button id="modeBtn" class="ctrl-btn" aria-label="Play mode" data-mode="single">
              <svg class="mode-single" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 12h12M3 12l4-4M3 12l4 4" />
                <circle cx="18" cy="8" r="3" />
              </svg>
              <svg class="mode-loop" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 2l4 4-4 4" />
                <path d="M3 11V9a4 4 0 014-4h14" />
                <path d="M7 22l-4-4 4-4" />
                <path d="M21 13v2a4 4 0 01-4 4H3" />
              </svg>
            </button>
            <button id="translateBtn" class="ctrl-btn" aria-label="Translation toggle">
              <span class="translate-label">CN</span>
            </button>
          </div>
        </footer>

        <audio id="audioEngine" preload="auto"></audio>
      </div>
    </dialog>
  </div>

  <script src="js/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>
</html>
